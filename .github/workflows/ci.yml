name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token; the build only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (JDK 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          # Spotless `ratchetFrom 'origin/main'` diffs against main, so the full
          # history (and the origin/main ref) must be present — not a shallow clone.
          fetch-depth: 0

      # Verify the checked-in Gradle wrapper jar is the genuine, untampered binary.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6.2.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.3.0
        with:
          distribution: temurin
          java-version: '21'

      # Configures Gradle with dependency/build caching across runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      # Fail fast on formatting before the slower compile + test. `build` also runs
      # spotlessCheck, but a dedicated step surfaces format violations clearly.
      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck --stacktrace

      # `build` compiles every module and runs the full JUnit suite.
      - name: Build and test
        run: ./gradlew build --stacktrace

      # Keep the HTML test reports for any module so failures are debuggable.
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-reports
          path: '**/build/reports/tests/test/'
          if-no-files-found: ignore
          retention-days: 7
